<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Share Your Info</title>
    <link rel="stylesheet" href="./login.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MyPortfolio</div>
            <ul class="nav-menu">
                <li><a href="./index.html" class="nav-link">Home</a></li>
                <li><a href="./portfolio.html" class="nav-link">Portfolio</a></li>
                <li><a href="./index.html#about" class="nav-link">About</a></li>
                <li><a href="./login.html" class="nav-link active login-btn">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="login-page">
        <section class="login-hero">
            <div class="login-panel">
                <div class="login-copy">
                    <h1>Share Your Info</h1>
                    <p>Tell me about yourself so I can learn who you are and how I can help.</p>
                    <div class="login-hint">
                        <span>Use the form to send your name, email, role, and a short message.</span>
                    </div>
                </div>

                <form id="userForm" class="login-form" autocomplete="off">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>

                    <label for="role">Your Role</label>
                    <input type="text" id="role" name="role" placeholder="Designer, developer, recruiter..." required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Tell me why you are reaching out or what you'd like me to know." required></textarea>

                    <button type="submit" class="submit-btn">Send Info</button>
                </form>

                <div id="userCard" class="info-card hidden">
                    <h2>Thanks for sharing!</h2>
                    <p class="info-text">I’ve received your information below:</p>
                    <div class="info-row"><strong>Name:</strong> <span id="displayName"></span></div>
                    <div class="info-row"><strong>Email:</strong> <span id="displayEmail"></span></div>
                    <div class="info-row"><strong>Role:</strong> <span id="displayRole"></span></div>
                    <div class="info-row"><strong>Message:</strong> <span id="displayMessage"></span></div>
                </div>
            </div>
        </section>
    </main>

    <script src="./login.js"></script>
</body>
</html>
